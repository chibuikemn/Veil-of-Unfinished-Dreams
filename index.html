<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Veil of Unfinished Dreams</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0d1b2a 100%);
      color: #c9a0dc;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(75, 0, 130, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #d8a5ff;
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
      font-size: 2.5em;
      letter-spacing: 2px;
    }
    #output {
      background: rgba(10, 14, 39, 0.8);
      border: 2px solid #8a2be2;
      border-radius: 8px;
      padding: 20px;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
      font-family: 'Courier New', monospace;
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.3), inset 0 0 20px rgba(138, 43, 226, 0.1);
    }
    #output::-webkit-scrollbar {
      width: 8px;
    }
    #output::-webkit-scrollbar-track {
      background: rgba(138, 43, 226, 0.1);
    }
    #output::-webkit-scrollbar-thumb {
      background: #8a2be2;
      border-radius: 4px;
    }
    #output div {
      margin-bottom: 8px;
      line-height: 1.5;
    }
    #input {
      width: 100%;
      padding: 12px;
      background: rgba(10, 14, 39, 0.9);
      color: #d8a5ff;
      border: 2px solid #8a2be2;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 1em;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
    }
    #input:focus {
      outline: none;
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.6), inset 0 0 10px rgba(138, 43, 226, 0.2);
      border-color: #d8a5ff;
    }
    #input::placeholder {
      color: #8a2be2;
    }
  </style>
</head>
<body>
  <h1>✦ Veil of Unfinished Dreams ✦</h1>
  <div id="output"></div>
  <input id="input" type="text" placeholder="Enter your command...">
  <script src="renderer.js"></script>
</body>
</html>
